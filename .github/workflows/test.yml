name: Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Swift Test
        run: swift test

      - name: Xcode Test
        run: xcodebuild test -project AIModelManager.xcodeproj -scheme AIModelManagerApp -configuration Debug -destination "platform=macOS"
