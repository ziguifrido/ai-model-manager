name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build and Test
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build (Debug)
        run: xcodebuild build -project AIModelManager.xcodeproj -scheme AIModelManagerApp -configuration Debug

      - name: Build (Release)
        run: xcodebuild build -project AIModelManager.xcodeproj -scheme AIModelManagerApp -configuration Release

      - name: Swift Test
        run: swift test
