name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    name: Build, Archive and Publish
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      # ---- Build ----
      - name: Archive
        run: |
          xcodebuild archive \
            -project AIModelManager.xcodeproj \
            -scheme AIModelManagerApp \
            -configuration Release \
            -archivePath /tmp/AIModelManager.xcarchive

      # ---- Package ----
      # Package the .app directly from the archive.
      # For notarized releases, replace this with:
      #   1. xcodebuild -exportArchive (with developer-id signing)
      #   2. xcrun notarytool submit
      #   3. xcrun stapler staple
      - name: Create ZIP
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            "/tmp/AIModelManager.xcarchive/Products/Applications/AI Model Manager.app" \
            /tmp/AIModelManager.zip

      - name: Generate Checksums
        run: |
          shasum -a 256 /tmp/AIModelManager.zip > /tmp/SHA256SUMS
          shasum -a 256 /tmp/AIModelManager.zip > /tmp/SHA256SUMS.txt
          cp /tmp/AIModelManager.zip /tmp/SHA256SUMS /tmp/SHA256SUMS.txt "${{ github.workspace }}"/

      - name: Generate Release Notes
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          scripts/create_release_notes.sh "$REF_NAME" /tmp/release_notes.md
          cp /tmp/release_notes.md "${{ github.workspace }}"/

      # ---- Notarization (optional - uncomment when signing is configured) ----
      # - name: Notarize
      #   run: |
      #     xcrun notarytool submit /tmp/AIModelManager.zip \
      #       --apple-id "${{ secrets.APPLE_ID }}" \
      #       --team-id "${{ secrets.APPLE_TEAM_ID }}" \
      #       --password "${{ secrets.APPLE_APP_PASSWORD }}" \
      #       --wait

      # - name: Staple
      #   run: |
      #     xcrun stapler staple /tmp/AIModelManager/AIModelManager.app
      #     ditto -c -k --sequesterRsrc --keepParent /tmp/AIModelManager/AIModelManager.app /tmp/AIModelManager_notarized.zip

      - name: Publish Release
        uses: softprops/action-gh-release@v3
        with:
          body_path: /tmp/release_notes.md
          files: |
            AIModelManager.zip
            SHA256SUMS
            SHA256SUMS.txt

      # ---- Homebrew Tap ----
      # Prerequisite: set TAP_GITHUB_TOKEN secret to a PAT with repo scope
      # for the target tap repository (ziguifrido/homebrew-ai-model-manager).
      - name: Update Homebrew Tap
        if: env.GH_TOKEN != ''
        env:
          GH_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          chmod +x scripts/setup_homebrew_tap.sh
          SHA=$(shasum -a 256 /tmp/AIModelManager.zip | awk '{print $1}')
          VERSION="${REF_NAME#v}"
          scripts/setup_homebrew_tap.sh "$VERSION" "$SHA"
        shell: bash
